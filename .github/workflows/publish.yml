name: Publish to PyPI
on:
  push:
    tags:
      - 'amstools-*'

jobs:
  build-n-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # This is the "key" for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1