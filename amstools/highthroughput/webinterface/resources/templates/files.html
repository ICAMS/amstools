{% extends "base.html" %}

{% block content %}
<pre>
    {{ req_path }}
</pre>
<ul>
    {% for file in files %}
    <li>
        <a href="/files/{{ (req_path + '/' if not req_path.endswith('/')  else req_path) + file }}">
            {{ file }}
        </a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
